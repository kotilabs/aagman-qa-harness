  - id: scr-11-05-dividend-rsi-oversold
    type: research
    prompt: "Dividend yield above 4% stocks that have RSI below 30 (oversold value picks)"
    success_markers: ["Found", "matches", "Symbol", "LTP", "dividend", "Results"]
    error_markers: ["Something went wrong", "failed to fetch", "error occurred", "Unable to process"]
    timeout: 120

  - id: scr-11-06-banking-roe-bollinger
    type: research
    prompt: "Banking stocks with ROE > 15 and price breaking out above Bollinger Band Upper"
    success_markers: ["Found", "matches", "Symbol", "LTP", "bank", "Results"]
    error_markers: ["Something went wrong", "failed to fetch", "error occurred", "Unable to process"]
    timeout: 120

  - id: scr-11-07-cashflow-volume-spike
    type: research
    prompt: "Cash flow positive companies (cash from operations > 0) with volume spike above 2x average"
    success_markers: ["Found", "matches", "Symbol", "LTP", "cash flow", "Results"]
    error_markers: ["Something went wrong", "failed to fetch", "error occurred", "Unable to process"]
    timeout: 120

  - id: scr-11-08-high-margin-52week-low
    type: research
    prompt: "High margin stocks (operating margin > 25%) that are near 52-week lows — price < EMA 200"
    success_markers: ["Found", "matches", "Symbol", "LTP", "Results"]
    error_markers: ["Something went wrong", "failed to fetch", "error occurred", "Unable to process"]
    timeout: 120

  - id: scr-11-09-fii-candlestick
    type: research
    prompt: "FII buying stocks (FII > 20%) with bullish engulfing candle pattern"
    success_markers: ["Found", "matches", "Symbol", "LTP", "FII", "Results"]
    error_markers: ["Something went wrong", "failed to fetch", "error occurred", "Unable to process"]
    timeout: 120
