name: backtest-mixed-8
env: staging
tests:
  - id: bt-1.1-ema-crossover
    type: backtest
    prompt: |
      Backtest a long-only EMA crossover strategy on RELIANCE (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when EMA(20) crosses above EMA(50) on the daily close. Exit: Stop loss at 1.5% below entry. Take profit at 4.5% above entry. Position sizing: Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.2-rsi-mean-reversion
    type: backtest
    prompt: |
      Backtest a long-only RSI mean-reversion strategy on HDFCBANK (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when RSI(14) crosses above 30, AND the closing price is above SMA(200). Exit: Stop loss at 2% below entry. Take profit at 6% above entry. Position sizing: Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.3-bollinger-rsi
    type: backtest
    prompt: |
      Backtest a long-only Bollinger Band reversion strategy on INFY (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when the daily closing price crosses above the lower Bollinger Band (20-period, 2 standard deviations), AND RSI(14) is below 40. Exit: Stop loss at 2% below entry. Take profit at 5% above entry. Position sizing: Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.4-macd-momentum
    type: backtest
    prompt: |
      Backtest a long-only MACD momentum strategy on TCS (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when the MACD line (12, 26, 9) crosses above the signal line, AND the closing price is above SMA(200). Exit: Stop loss at 1.5% below entry. Take profit at 4.5% above entry. Position sizing: Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.5-adx-trend
    type: backtest
    prompt: |
      Backtest a long-only trend-following strategy on WIPRO (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when ADX(14) is above 25, the closing price is above EMA(50), AND EMA(20) crosses above EMA(50). Exit: Stop loss at 2% below entry. Take profit at 6% above entry. Position sizing: Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.6-stochastic-crossover
    type: backtest
    prompt: |
      Backtest a long-only Stochastic crossover strategy on BAJFINANCE (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when Stochastic %K (5, 3, 0, 3, 0) crosses above %D, AND both %K and %D are below 30. Exit: Stop loss at 2% below entry. Take profit at 5% above entry. Starting capital Rs 10,00,000. Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.7-parabolic-sar
    type: backtest
    prompt: |
      Backtest a long-only Parabolic SAR trend strategy on ONGC (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when the daily closing price crosses above SAR(0.02, 0.2), AND EMA(20) is above EMA(50). Exit: Stop loss at 2% below entry. Take profit at 6% above entry. Starting capital Rs 10,00,000. Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"

  - id: bt-1.8-hammer-rsi-sma
    type: backtest
    prompt: |
      Backtest a long-only Hammer candlestick pattern strategy on KOTAKBANK (NSE) on a 1-day timeframe from 1 January 2025 to 1 January 2026. Entry: Go LONG when a bullish Hammer pattern (CDLHAMMER) is detected on the daily bar, AND RSI(14) is below 50, AND the closing price is above SMA(200). Exit: Stop loss at 2% below entry. Take profit at 4% above entry. Starting capital Rs 10,00,000. Buy 50 shares per trade. Fees 5 bps, slippage 3 bps.
    error_markers:
      - "Something went wrong"
      - "failed to fetch"
      - "error occurred"
      - "Unable to process"
